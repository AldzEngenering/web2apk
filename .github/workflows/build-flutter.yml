name: Build Flutter APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      zip_url:
        description: 'ZIP URL Project'
        required: true
      user_id:
        description: 'User ID'
        required: true

jobs:
  build-flutter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Download Project
        run: |
          mkdir project
          cd project
          wget -O project.zip "${{ github.event.inputs.zip_url }}"
          unzip -q project.zip
          rm project.zip

      - name: Build APK
        working-directory: project
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}
          path: project/build/app/outputs/apk/release/app-release.apk