name: Build APK from URL

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Nama Aplikasi'
        required: true
      package_name:
        description: 'Package Name'
        required: true
      url:
        description: 'Website URL'
        required: true
      user_id:
        description: 'User ID'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build WebView APK
        run: |
          echo "Building WebView APK for ${{ inputs.app_name }}"
          echo "URL: ${{ inputs.url }}"
          echo "Package: ${{ inputs.package_name }}"
          echo "APK content for ${{ inputs.app_name }}" > app.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app_name }}
          path: app.apk
