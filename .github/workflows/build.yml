name: Web2APK Pro Build System

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name (contoh: com.example.myapp)'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP Flutter (Opsional)'
        required: false
        type: string

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.19.6'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git wget unzip jq curl

      # ============================================
      # BUILD WEBSITE TO APK
      # ============================================
      - name: Build APK from URL
        if: ${{ inputs.url != '' && inputs.url != 'null' }}
        run: |
          # 1. Ekstrak nama org dan nama app dari package_name (misal: com.company.app)
          # Kita pisahkan com.company sebagai org, dan 'app' sebagai nama project internal
          ORG_NAME=$(echo "${{ inputs.package_name }}" | rev | cut -d'.' -f2- | rev)
          PROJECT_NAME=$(echo "${{ inputs.package_name }}" | rev | cut -d'.' -f1 | rev)
          
          # Buat project baru dengan package name yang presisi dari awal
          flutter create --org "$ORG_NAME" --project-name "$PROJECT_NAME" myapp
          cd myapp

          # 2. Update pubspec.yaml untuk WebView
          cat > pubspec.yaml << 'EOF'
  name: myapp
  description: Web2APK Flutter project.
  publish_to: 'none'
  version: 1.0.0+1

  environment:
    sdk: '>=3.0.0 <4.0.0'

  dependencies:
    flutter:
      sdk: flutter
    webview_flutter: ^4.4.0

  dev_dependencies:
    flutter_test:
      sdk: flutter
    flutter_lints: ^3.0.0

  flutter:
    uses-material-design: true
  EOF

          # 3. Tulis ulang lib/main.dart
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(MyApp());
          }

          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData.dark(),
                home: WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            @override
            _WebViewScreenState createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                  ),
                )
                ..loadRequest(Uri.parse('${{ inputs.url }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: Stack(
                    children: [
                      WebViewWidget(controller: controller),
                      if (isLoading)
                        Center(
                          child: CircularProgressIndicator(
                            valueColor: AlwaysStoppedAnimation<Color>(Colors.blue),
                          ),
                        ),
                    ],
                  ),
                ),
              );
            }
          }
          EOF

          # 4. Inject permission INTERNET & Cleartext Traffic ke AndroidManifest bawaan secara aman
          # Menggunakan sed untuk menyelipkan izin internet di bawah tag <manifest>
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          
          # Mengubah nama aplikasi di Manifest secara dinamis
          sed -i 's/android:label=".*"/android:label="${{ inputs.app_name }}"/g' android/app/src/main/AndroidManifest.xml
          
          # Mengizinkan HTTP (Cleartext) jika web target belum HTTPS
          sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml

          # 5. Sesuaikan Versi SDK di build.gradle secara presisi
          sed -i "s/minSdkVersion .*/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/g" android/app/build.gradle

          # 6. Jalankan Build Build
          flutter pub get
          flutter build apk --release

      # ============================================
      # UPLOAD ARTIFACT (Back-up)
      # ============================================
      - name: Upload APK Artifact
        if: success()
        uses: actions/actions-artifact/upload-artifact@v4
        with:
          name: apk-builds
          path: myapp/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      # ============================================
      # KIRIM KE TELEGRAM VIA CURL (LEBIH STABIL UNTUK FILE)
      # ============================================
      - name: Kirim APK ke Telegram
        if: success()
        run: |
          CAPTION=$(printf "✅ *Build Berhasil!*\n\n📱 *Nama:* ${{ inputs.app_name }}\n📦 *Package:* \`${{ inputs.package_name }}\`")
          
          curl -F chat_id="${{ inputs.user_id }}" \
               -F document=@"myapp/build/app/outputs/flutter-apk/app-release.apk" \
               -F caption="$CAPTION" \
               -F parse_mode="Markdown" \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument

      - name: Notifikasi Gagal
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Build Gagal*

            📱 Nama: ${{ inputs.app_name }}
            👤 User: ${{ inputs.user_id }}
            📦 Package: ${{ inputs.package_name }}

            🔍 Cek log:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}