name: Web2APK Pro Build System

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL (untuk WebView)'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name (com.example.app)'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP Project Flutter'
        required: false
        type: string

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.24.0'

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git wget unzip jq curl

      # ============================================
      # PREPARE PROJECT
      # ============================================
      - name: Create Project Directory
        run: mkdir -p workspace

      - name: Download Flutter Project (if ZIP)
        if: ${{ inputs.zip_url != '' && inputs.zip_url != 'null' }}
        run: |
          cd workspace
          wget -O project.zip "${{ inputs.zip_url }}"
          unzip -o project.zip -d project/
          # Cari pubspec.yaml
          if [ -f "project/pubspec.yaml" ]; then
            echo "✅ Flutter project ditemukan"
            mv project/* ./
          elif [ -f "project/*/pubspec.yaml" ]; then
            echo "✅ Flutter project ditemukan di subfolder"
            find project -name "pubspec.yaml" -exec dirname {} \; | head -1 | xargs -I {} mv {}/* ./
          else
            echo "❌ pubspec.yaml tidak ditemukan!"
            exit 1
          fi
          rm -rf project
          ls -la

      - name: Create WebView Project (if URL)
        if: ${{ inputs.url != '' && inputs.url != 'null' }}
        run: |
          cd workspace
          flutter create --org com.web2apk --project-name "${{ inputs.app_name }}" webview_project
          cd webview_project
          
          # Tambahkan webview_flutter
          echo "" >> pubspec.yaml
          echo "dependencies:" >> pubspec.yaml
          echo "  flutter:" >> pubspec.yaml
          echo "    sdk: flutter" >> pubspec.yaml
          echo "  webview_flutter: ^4.8.0" >> pubspec.yaml
          
          flutter pub get
          
          # Buat main.dart dengan WebView
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          
          void main() => runApp(MyApp());
          
          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData.dark(),
                home: WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }
          
          class WebViewScreen extends StatefulWidget {
            @override
            _WebViewScreenState createState() => _WebViewScreenState();
          }
          
          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool _isLoading = true;
            
            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setBackgroundColor(const Color(0x00000000))
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (String url) {
                      setState(() => _isLoading = false);
                    },
                  ),
                )
                ..loadRequest(Uri.parse('${{ inputs.url }}'));
            }
            
            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (_isLoading)
                      Container(
                        color: Colors.black,
                        child: Center(
                          child: Column(
                            mainAxisAlignment: MainAxisAlignment.center,
                            children: [
                              CircularProgressIndicator(
                                valueColor: AlwaysStoppedAnimation<Color>(Colors.blue),
                              ),
                              SizedBox(height: 20),
                              Text('Loading...', style: TextStyle(color: Colors.white70)),
                            ],
                          ),
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF
          
          # Update AndroidManifest
          sed -i 's/<uses-permission android:name="android.permission.INTERNET"\/>//g' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/a\    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/a\    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' android/app/src/main/AndroidManifest.xml
          
          # Update package name
          sed -i "s/applicationId \".*\"/applicationId \"${{ inputs.package_name }}\"/g" android/app/build.gradle
          
          cd ..

      - name: Move Project to Workspace
        run: |
          cd workspace
          if [ -d "webview_project" ]; then
            mv webview_project/* ./
            rm -rf webview_project
          fi
          ls -la

      # ============================================
      # BUILD APK
      # ============================================
      - name: Clean Build
        run: |
          cd workspace
          flutter clean
          flutter pub get

      - name: Build Release APK
        run: |
          cd workspace
          flutter build apk --release --split-per-abi

      - name: Check Build Output
        run: |
          echo "📂 Checking build output..."
          ls -la workspace/build/app/outputs/flutter-apk/ || echo "No output!"
          find workspace -name "*.apk" || echo "No APK found!"

      # ============================================
      # UPLOAD ARTIFACT - PASTIKAN INI ADA!
      # ============================================
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: |
            workspace/build/app/outputs/flutter-apk/*.apk
          retention-days: 7
          if-no-files-found: warn

      # ============================================
      # KIRIM KE TELEGRAM (FALLBACK)
      # ============================================
      - name: Kirim APK ke Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Build Berhasil!*

            📱 Nama: ${{ inputs.app_name }}
            📦 Package: ${{ inputs.package_name }}

            📤 Mengirim APK...
          document: workspace/build/app/outputs/flutter-apk/app-release.apk

      - name: Kirim APK Split (ARM64)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: workspace/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - name: Kirim APK Split (ARMv7)
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          document: workspace/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Notifikasi Gagal
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Build Gagal*

            📱 Nama: ${{ inputs.app_name }}
            👤 User: ${{ inputs.user_id }}
            📦 Package: ${{ inputs.package_name }}

            🔍 Cek log GitHub Actions untuk detail.
