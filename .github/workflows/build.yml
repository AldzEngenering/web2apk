name: Web2APK Builder

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP Flutter Project'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Validate Inputs
        run: |
          if [ -z "${{ inputs.url }}" ] && [ -z "${{ inputs.zip_url }}" ]; then
            echo "❌ Salah satu dari 'url' atau 'zip_url' harus diisi!"
            exit 1
          fi
          echo "✅ Input valid."

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      # ============================================================
      # 🔥 FIX: Install Tools dengan retry dan verbose
      # ============================================================
      - name: Install Tools
        run: |
          echo "📦 Updating package list..."
          sudo apt-get update -y || echo "⚠️ Update failed, continuing..."

          echo "📦 Installing required packages..."
          sudo apt-get install -y \
            wget \
            unzip \
            curl \
            ninja-build \
            cmake \
            git \
            jq || echo "⚠️ Some packages failed, continuing..."

          echo "✅ Tools installed successfully!"
          which wget unzip curl ninja cmake git jq || echo "⚠️ Some tools not found"

      # ============================================================
      # BUILD DARI URL
      # ============================================================
      - name: Build from URL
        if: ${{ inputs.url != '' && inputs.url != 'null' }}
        env:
          APP_NAME: ${{ inputs.app_name }}
          APP_URL: ${{ inputs.url }}
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: |
          set -e

          # Fungsi escape aman untuk digunakan sebagai pengganti sed
          escape_sed() {
            printf '%s' "$1" | sed -e 's/[\/&]/\\&/g'
          }

          ESC_APP_NAME=$(escape_sed "$APP_NAME")
          ESC_APP_URL=$(escape_sed "$APP_URL")
          ESC_PACKAGE_NAME=$(escape_sed "$PACKAGE_NAME")

          echo "📱 Creating Flutter project..."
          flutter create --org com.web2apk --project-name myapp myapp
          cd myapp

          echo "📝 Configuring pubspec.yaml..."
          cat > pubspec.yaml << 'EOF'
          name: myapp
          description: WebView App
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^2.0.0

          flutter:
            uses-material-design: true
          EOF

          echo "📝 Creating main.dart..."
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '__APP_NAME__',
                theme: ThemeData.dark(),
                home: const WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            const WebViewScreen({super.key});

            @override
            State<WebViewScreen> createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late final WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (url) {
                      setState(() => isLoading = false);
                    },
                  ),
                )
                ..loadRequest(Uri.parse('__APP_URL__'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      const Center(
                        child: CircularProgressIndicator(
                          valueColor: AlwaysStoppedAnimation<Color>(Colors.blue),
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF

          # Ganti placeholder dengan nilai asli (sudah di-escape agar aman)
          sed -i "s/__APP_NAME__/${ESC_APP_NAME}/g" lib/main.dart
          sed -i "s#__APP_URL__#${ESC_APP_URL}#g" lib/main.dart

          echo "📝 Configuring Android Manifest..."
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="__PACKAGE_NAME__">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="__APP_NAME__"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/Theme.AppCompat.NoActionBar"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          sed -i "s/__PACKAGE_NAME__/${ESC_PACKAGE_NAME}/g" android/app/src/main/AndroidManifest.xml
          sed -i "s/__APP_NAME__/${ESC_APP_NAME}/g" android/app/src/main/AndroidManifest.xml

          echo "📝 Configuring build.gradle..."
          sed -i "s/applicationId \".*\"/applicationId \"${ESC_PACKAGE_NAME}\"/g" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/g" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode 1/g" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"1.0.0\"/g" android/app/build.gradle

          echo "📦 Getting dependencies..."
          flutter pub get

          echo "🧹 Cleaning..."
          flutter clean

          echo "🔨 Building APK..."
          flutter build apk --release

          echo "✅ Build complete!"

      # ============================================================
      # BUILD DARI ZIP
      # ============================================================
      - name: Build from ZIP
        if: ${{ inputs.zip_url != '' && inputs.zip_url != 'null' }}
        env:
          ZIP_URL: ${{ inputs.zip_url }}
        run: |
          set -e
          echo "📦 Downloading ZIP..."
          mkdir -p workspace
          cd workspace
          wget -O project.zip "$ZIP_URL"
          unzip -o project.zip -d project/

          # Cari folder yang benar-benar berisi pubspec.yaml (support nested folder di dalam zip)
          PUBSPEC_PATH=$(find project -maxdepth 3 -name "pubspec.yaml" | head -n 1)

          if [ -z "$PUBSPEC_PATH" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC_PATH")
          echo "📂 Project ditemukan di: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          echo "📦 Getting dependencies..."
          flutter pub get

          echo "🧹 Cleaning..."
          flutter clean

          echo "🔨 Building APK..."
          flutter build apk --release

          echo "✅ Build complete!"

      # ============================================================
      # LOCATE APK (agar step berikutnya tidak hardcode path)
      # ============================================================
      - name: Locate APK
        if: success()
        id: locate_apk
        run: |
          APK_PATH=$(find . -path "*/build/app/outputs/flutter-apk/app-release.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK tidak ditemukan!"
            exit 1
          fi
          echo "✅ APK ditemukan: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      # ============================================================
      # UPLOAD & SEND
      # ============================================================
      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: ${{ steps.locate_apk.outputs.apk_path }}
          retention-days: 7

      - name: Send APK to Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Build Berhasil!*

            📱 Nama: ${{ inputs.app_name }}
            📦 Package: ${{ inputs.package_name }}
            📤 Mengirim APK...
          document: ${{ steps.locate_apk.outputs.apk_path }}

      - name: Notify Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Build Gagal*

            📱 Nama: ${{ inputs.app_name }}
            👤 User: ${{ inputs.user_id }}
            📦 Package: ${{ inputs.package_name }}

            🔍 Cek log:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}