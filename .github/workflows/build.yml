name: Web2APK Pro Build System

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: false
        type: string
      app_name:
        description: 'Nama Aplikasi'
        required: true
        type: string
      package_name:
        description: 'Package Name'
        required: true
        type: string
      user_id:
        description: 'Telegram User ID'
        required: true
        type: string
      zip_url:
        description: 'URL ZIP Flutter'
        required: false
        type: string

env:
  JAVA_VERSION: '17'
  FLUTTER_VERSION: '3.19.6'  # Versi paling stabil

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake git wget unzip jq curl

      # ============================================
      # 🔥 TEST: Buat project Flutter dulu
      # ============================================
      - name: Test Flutter Project
        run: |
          flutter create --org com.web2apk test_project
          cd test_project
          flutter pub get
          flutter build apk --debug
          echo "✅ Flutter project berhasil dibuat!"

      # ============================================
      # BUILD WEBSITE TO APK (PAKAI TEMPLATE TERBUKTI)
      # ============================================
      - name: Build APK from URL
        if: ${{ inputs.url != '' && inputs.url != 'null' }}
        run: |
          # BUAT PROJECT
          flutter create --org com.web2apk myapp
          cd myapp

          # PUBSPEC.YAML - PAKAI YANG SUDAH TERBUKTI
          cat > pubspec.yaml << 'EOF'
          name: myapp
          description: A new Flutter project.
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.4.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^2.0.0

          flutter:
            uses-material-design: true
          EOF

          # MAIN.DART - PAKAI YANG SUDAH TERBUKTI
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';

          void main() {
            runApp(MyApp());
          }

          class MyApp extends StatelessWidget {
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: '${{ inputs.app_name }}',
                theme: ThemeData.dark(),
                home: WebViewScreen(),
                debugShowCheckedModeBanner: false,
              );
            }
          }

          class WebViewScreen extends StatefulWidget {
            @override
            _WebViewScreenState createState() => _WebViewScreenState();
          }

          class _WebViewScreenState extends State<WebViewScreen> {
            late WebViewController controller;
            bool isLoading = true;

            @override
            void initState() {
              super.initState();
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..setNavigationDelegate(
                  NavigationDelegate(
                    onPageFinished: (url) {
                      setState(() {
                        isLoading = false;
                      });
                    },
                  ),
                )
                ..loadRequest(Uri.parse('${{ inputs.url }}'));
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: Stack(
                  children: [
                    WebViewWidget(controller: controller),
                    if (isLoading)
                      Center(
                        child: CircularProgressIndicator(
                          valueColor: AlwaysStoppedAnimation<Color>(Colors.blue),
                        ),
                      ),
                  ],
                ),
              );
            }
          }
          EOF

          # ANDROID MANIFEST
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ inputs.package_name }}">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="${{ inputs.app_name }}"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true"
                  android:allowBackup="true"
                  android:theme="@style/Theme.AppCompat.NoActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/Theme.AppCompat.NoActionBar"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # UPDATE BUILD.GRADLE
          sed -i "s/applicationId \".*\"/applicationId \"${{ inputs.package_name }}\"/g" android/app/build.gradle
          sed -i "s/minSdkVersion .*/minSdkVersion 21/g" android/app/build.gradle
          sed -i "s/targetSdkVersion .*/targetSdkVersion 34/g" android/app/build.gradle
          sed -i "s/versionCode .*/versionCode 1/g" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"1.0.0\"/g" android/app/build.gradle

          # GET DEPENDENCIES & BUILD
          flutter pub get
          flutter clean
          flutter build apk --release

      # ============================================
      # UPLOAD ARTIFACT
      # ============================================
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-builds
          path: |
            myapp/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      # ============================================
      # KIRIM KE TELEGRAM
      # ============================================
      - name: Kirim APK ke Telegram
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ inputs.user_id }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ✅ *Build Berhasil!*

            📱 Nama: ${{ inputs.app_name }}
            📦 Package: ${{ inputs.package_name }}
            📤 Mengirim APK...
          document: myapp/build/app/outputs/flutter-apk/app-release.apk

      - name: Notifikasi Gagal
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.ADMIN_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ *Build Gagal*

            📱 Nama: ${{ inputs.app_name }}
            👤 User: ${{ inputs.user_id }}
            📦 Package: ${{ inputs.package_name }}

            🔍 Cek log:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}